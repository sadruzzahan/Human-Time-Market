      summary: Get the current user's time swaps
      responses:
        "200":
          description: List of swaps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSwapDetail"
    post:
      operationId: proposeSwap
      tags: [derivatives]
      summary: Propose a time swap with another professional
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposeSwapBody"
      responses:
        "201":
          description: Swap proposed
