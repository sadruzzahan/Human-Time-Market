          type: integer
        clerkId:
          type: string
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        experienceLevel:
          $ref: "#/components/schemas/ExperienceLevel"
        hourlyRateBaselineCents:
          type: ["integer", "null"]
        isOnboarded:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
