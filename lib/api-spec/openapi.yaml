openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Human Time Market API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User and profile operations
  - name: skill-categories
    description: Skill category taxonomy
  - name: listings
    description: Time commitment listings
  - name: bids
    description: Bid management
  - name: rfps
    description: Requests for Professionals
  - name: order-book
    description: Order book and price discovery
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users/me:
    get:
      operationId: getMyProfile
      tags: [users]
      summary: Get the current user's profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: upsertMyProfile
      tags: [users]
      summary: Create or update the current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{userId}:
    get:
      operationId: getPublicProfile
      tags: [users]
      summary: Get a public professional profile
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me/skills:
    get:
      operationId: getMySkills
      tags: [users]
      summary: Get the current user's selected skills
      responses:
        "200":
          description: List of skill category IDs for this user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSkill"
    put:
      operationId: updateMySkills
      tags: [users]
      summary: Replace the current user's skills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSkillsBody"
      responses:
        "200":
          description: Updated skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSkill"

  /skill-categories:
    get:
      operationId: listSkillCategories
      tags: [skill-categories]
      summary: List all skill categories (hierarchical)
      responses:
        "200":
          description: List of skill categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SkillCategory"

  /skill-categories/{id}:
    get:
      operationId: getSkillCategory
      tags: [skill-categories]
      summary: Get a single skill category with its children
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skill category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillCategory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings:
    get:
      operationId: listListings
      tags: [listings]
      summary: Browse marketplace listings with filters
      parameters:
        - name: skillCategoryId
          in: query
          schema:
            type: integer
        - name: listingType
          in: query
          schema:
            $ref: "#/components/schemas/ListingType"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ListingStatus"
        - name: minRateCents
          in: query
          schema:
            type: integer
        - name: maxRateCents
          in: query
          schema:
            type: integer
        - name: startDateAfter
          in: query
          schema:
            type: string
        - name: experienceLevel
          in: query
          schema:
            $ref: "#/components/schemas/ExperienceLevel"
        - name: timezone
          in: query
          schema:
            type: string
        - name: professionalId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsPage"

    post:
      operationId: createListing
      tags: [listings]
      summary: Create a new time listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingBody"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{listingId}:
    get:
      operationId: getListing
      tags: [listings]
      summary: Get listing detail including bids and professional profile
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateListing
      tags: [listings]
      summary: Update a listing (owner only)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingBody"
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingDetail"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteListing
      tags: [listings]
      summary: Cancel/delete a listing (owner only, must be open)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{listingId}/book:
    post:
      operationId: bookListing
      tags: [listings]
      summary: Book a fixed-rate listing (transitions to committed + creates escrow stub)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingConfirmation"
        "400":
          description: Cannot book
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{listingId}/bids:
    get:
      operationId: listBids
      tags: [bids]
      summary: List all bids on a listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of bids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BidDetail"
    post:
      operationId: placeBid
      tags: [bids]
      summary: Place a bid on an auction listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceBidBody"
      responses:
        "201":
          description: Bid placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BidDetail"
        "400":
          description: Cannot bid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{listingId}/bids/{bidId}/accept:
    post:
      operationId: acceptBid
      tags: [bids]
      summary: Accept a bid (listing owner only, transitions listing to committed)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
        - name: bidId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bid accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingConfirmation"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/me:
    get:
      operationId: getMyListings
      tags: [listings]
      summary: Get current user's own listings
      responses:
        "200":
          description: User's listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ListingDetail"

  /rfps:
    get:
      operationId: listRfps
      tags: [rfps]
      summary: Browse open RFPs
      parameters:
        - name: skillCategoryId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/RfpStatus"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated list of RFPs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfpsPage"
    post:
      operationId: createRfp
      tags: [rfps]
      summary: Post a new RFP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRfpBody"
      responses:
        "201":
          description: Created RFP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfpDetail"

  /rfps/{rfpId}:
    get:
      operationId: getRfp
      tags: [rfps]
      summary: Get RFP detail with responses
      parameters:
        - name: rfpId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: RFP detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfpDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /rfps/{rfpId}/responses:
    post:
      operationId: respondToRfp
      tags: [rfps]
      summary: Submit a response to an RFP
      parameters:
        - name: rfpId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRfpResponseBody"
      responses:
        "201":
          description: Response submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RfpResponseDetail"
        "400":
          description: Cannot respond
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    post:
      operationId: placeOrder
      tags: [order-book]
      summary: Place a bid or ask order in the order book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderBody"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderId}:
    delete:
      operationId: cancelOrder
      tags: [order-book]
      summary: Cancel an open or partially-filled order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /order-book/{skillCategoryId}:
    get:
      operationId: getOrderBook
      tags: [order-book]
      summary: Get current order book depth for a skill category
      parameters:
        - name: skillCategoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order book depth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderBookDepth"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /price-index:
    get:
      operationId: getPriceIndex
      tags: [order-book]
      summary: Get current VWAP price index for all skill categories
      responses:
        "200":
          description: Price index entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceIndexEntry"

  /order-book/{skillCategoryId}/events:
    get:
      operationId: getOrderBookEvents
      tags: [order-book]
      summary: Server-Sent Events stream for real-time order book updates
      description: >
        Returns a text/event-stream (SSE) connection. Emits `order-book` events
        whenever the order book for this skill category changes (new order, cancel, or fill).
        Each event data payload is a JSON-serialized OrderBookDepth object.
        Keep-alive pings are sent every 30 s.
      parameters:
        - name: skillCategoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string

  /price-index/events:
    get:
      operationId: getPriceIndexEvents
      tags: [order-book]
      summary: Server-Sent Events stream for real-time price index updates
      description: >
        Returns a text/event-stream (SSE) connection. Emits `price-index` events
        whenever any skill category's VWAP or volume changes (i.e., after a trade is matched).
        Each event data payload is a JSON array of PriceIndexEntry objects.
        Keep-alive pings are sent every 30 s.
      responses:
        "200":
          description: SSE stream (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string

  /price-history/{skillCategoryId}:
    get:
      operationId: getPriceHistory
      tags: [order-book]
      summary: Get last 30 days of daily VWAP for a skill category
      parameters:
        - name: skillCategoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceHistoryPoint"

  /dashboard/professional/commitments:
    get:
      operationId: getProfessionalCommitments
      tags: [dashboard]
      summary: Get all active and upcoming committed listings for the authenticated professional
      responses:
        "200":
          description: Professional commitments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfessionalCommitment"

  /dashboard/professional/cash-flow:
    get:
      operationId: getProfessionalCashFlow
      tags: [dashboard]
      summary: Get projected weekly earnings based on active committed contracts
      responses:
        "200":
          description: Cash flow projections by week
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CashFlowWeek"

  /dashboard/professional/earnings:
    get:
      operationId: getProfessionalEarnings
      tags: [dashboard]
      summary: Get earnings history from completed contracts
      responses:
        "200":
          description: Earnings history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EarningsEntry"

  /dashboard/professional/rate-health:
    get:
      operationId: getProfessionalRateHealth
      tags: [dashboard]
      summary: Get rate health — current listing rate vs market VWAP per skill category
      responses:
        "200":
          description: Rate health entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RateHealthEntry"

  /dashboard/buyer/commitments:
    get:
      operationId: getBuyerCommitments
      tags: [dashboard]
      summary: Get all committed listings purchased by the authenticated buyer
      responses:
        "200":
          description: Buyer commitments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BuyerCommitment"

  /listings/{listingId}/deliveries:
    post:
      operationId: logDelivery
      tags: [dashboard]
      summary: Log delivered hours against a committed contract (professional only)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogDeliveryBody"
      responses:
        "201":
          description: Delivery log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryLog"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{listingId}/deliveries/{deliveryId}/confirm:
    post:
      operationId: confirmDelivery
      tags: [dashboard]
      summary: Buyer confirms a delivery log entry
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
        - name: deliveryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryLog"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/{listingId}/dispute:
    post:
      operationId: openDispute
      tags: [dashboard]
      summary: Open a dispute on a committed contract
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenDisputeBody"
      responses:
        "201":
          description: Dispute opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispute"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /notifications:
    get:
      operationId: getNotifications
      tags: [dashboard]
      summary: Get the current user's notification feed with unread badge count
      responses:
        "200":
          description: Notification feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationFeed"

  /notifications/read:
    post:
      operationId: markNotificationsRead
      tags: [dashboard]
      summary: Mark notifications as read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkReadBody"
      responses:
        "204":
          description: Marked as read

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ExperienceLevel:
      type: string
      enum: [junior, mid, senior, principal, expert]

    ListingType:
      type: string
      enum: [fixed_rate, auction, emergency]

    ListingStatus:
      type: string
      enum: [open, in_bidding, committed, in_dispute, completed, cancelled]

    BidStatus:
      type: string
      enum: [pending, accepted, rejected, withdrawn]

    RfpStatus:
      type: string
      enum: [open, closed, fulfilled]

    RfpResponseStatus:
      type: string
      enum: [submitted, accepted, rejected, withdrawn]

    EscrowStatus:
      type: string
      enum: [pending_payment, held, released, refunded]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        experienceLevel:
          $ref: "#/components/schemas/ExperienceLevel"
        hourlyRateBaselineCents:
          type: ["integer", "null"]
        isOnboarded:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - clerkId
        - displayName
        - experienceLevel
        - isOnboarded
        - createdAt
        - updatedAt

    PublicProfile:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        experienceLevel:
          $ref: "#/components/schemas/ExperienceLevel"
        hourlyRateBaselineCents:
          type: ["integer", "null"]
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillCategory"
      required:
        - id
        - clerkId
        - displayName
        - experienceLevel
        - skills

    UpsertProfileBody:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: ["string", "null"]
        timezone:
          type: ["string", "null"]
        experienceLevel:
          $ref: "#/components/schemas/ExperienceLevel"
        hourlyRateBaselineCents:
          type: ["integer", "null"]
      required:
        - displayName
        - experienceLevel

    UpdateSkillsBody:
      type: object
      properties:
        skillCategoryIds:
          type: array
          items:
            type: integer
      required:
        - skillCategoryIds

    UserSkill:
      type: object
      properties:
        skillCategoryId:
          type: integer
        skillCategoryName:
          type: string
        parentName:
          type: ["string", "null"]
      required:
        - skillCategoryId
        - skillCategoryName

    SkillCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parentId:
          type: ["integer", "null"]
        children:
          type: array
          items:
            $ref: "#/components/schemas/SkillCategoryChild"
      required:
        - id
        - name
        - slug
        - children

    SkillCategoryChild:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        parentId:
          type: ["integer", "null"]
      required:
        - id
        - name
        - slug

    ListingSummary:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        skillCategoryId:
          type: integer
        skillCategoryName:
          type: string
        skillCategoryParentName:
          type: ["string", "null"]
        hoursPerWeek:
          type: integer
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        listingType:
          $ref: "#/components/schemas/ListingType"
        rateCents:
          type: integer
        marketRateCents:
