kind = "web"
previewPath = "/"
title = "Human Time Market"
version = "1.0.0"
id = "artifacts/human-time-market"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21923

[services.development]
run = "pnpm --filter @workspace/human-time-market run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/human-time-market", "run", "build" ]
publicDir = "artifacts/human-time-market/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21923"
BASE_PATH = "/"
